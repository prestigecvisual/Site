<!DOCTYPE html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="js/db.js"></script>
<script src="js/app.js" defer></script>
<script src="js/pdf.js" defer></script>
<script src="js/envio.js" defer></script>
</head>

<body>

<header>
<h1>Prestige Comunicação Visual</h1>
<p>Ref: <span id="numeroOrcamento"></span></p>
</header>

<main class="grid">

<div>
<h3>Cliente</h3>
<input id="clienteNome" placeholder="Nome">
<input id="clienteTelefone" placeholder="Telefone">
<input id="clienteWhatsApp" placeholder="WhatsApp">
<input id="clienteEmail" placeholder="Email">
<input id="clienteCEP" placeholder="CEP" onblur="buscarCEP()">
<input id="clienteEndereco" placeholder="Endereço">
<input id="clienteNumero" placeholder="Número">
<input id="clienteBairro" placeholder="Bairro">
<input id="clienteCidade" placeholder="Cidade">
<input id="clienteEstado" placeholder="Estado">

<h3>Produto</h3>
<select id="produto"></select>
<input id="quantidade" type="number" value="1">
<input id="largura" placeholder="L (cm)">
<input id="altura" placeholder="A (cm)">
<button onclick="adicionarItem()">Adicionar</button>

<h3>Itens</h3>
<div id="listaItens"></div>
</div>

<div>
<h3>Resumo</h3>
<div id="danfeCabecalho"></div>
<table id="danfeTabela">
<tbody id="danfeCorpo"></tbody>
</table>
<p>Total: R$ <span id="totalGeral">0</span></p>

<div id="danfeQRCode"></div>

<p style="text-align:center">Deus Seja Sempre Louvado! Tudo posso Naquele que me Fortalece!</p>

<button onclick="salvarOrcamento()">Salvar</button>
<button onclick="finalizarPedido()">Finalizar</button>
<button onclick="gerarPDF()">PDF</button>
<button onclick="enviarWhatsApp()">WhatsApp</button>
<button onclick="enviarEmail()">Email</button>
</div>

</main>

</body>
</html>
